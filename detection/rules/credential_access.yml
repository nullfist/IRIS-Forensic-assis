# Credential Access Detection Rules
# These rules detect techniques used to steal credentials, including LSASS access,
# credential dumping tools, and pass-the-hash attacks

---
# Rule: LSASS memory access
rule_id: CRE-001
name: LSASS Memory Access Detected
description: >
  Detects processes accessing the LSASS process memory, which is a strong
  indicator of credential dumping activity (e.g., Mimikatz, ProDump).
family: credential_access
severity: critical
confidence: 0.95
phase: credential_access
attack_tactics:
  - Credential Access
  - Technique: T1003.001
match_any:
  - lsass
  - sekurlsa
  - mimikatz
conditions:
  - field: process.image
    operator: regex
    value: "(?i)(lsass|sam|ntds)"
  - field: raw_data.TargetImage
    operator: contains
    value: lsass

---
# Rule: Mimikatz execution
rule_id: CRE-002
name: Mimikatz Execution Detected
description: >
  Detects execution of Mimikatz or Mimikatz-like tools used for
  credential dumping from memory.
family: credential_access
severity: critical
confidence: 0.97
phase: credential_access
attack_tactics:
  - Credential Access
  - Technique: T1003.001
match_any:
  - mimikatz
  - sekurlsa
  - logonpasswords
conditions:
  - field: process.image
    operator: regex
    value: "(?i)(mimikatz|kiwi)"
  - field: process.command_line
    operator: regex
    value: "(?i)(sekurlsa|logonpasswords|lsadump|samdump)"

---
# Rule: ProDump usage
rule_id: CRE-003
name: ProDump LSASS Dump
description: >
  Detects the use of ProDump or similar tools to create memory dumps
  of the LSASS process for offline credential extraction.
family: credential_access
severity: critical
confidence: 0.93
phase: credential_access
attack_tactics:
  - Credential Access
  - Technique: T1003.001
match_any:
  - procdump
  - lsass
  - minidump
conditions:
  - field: process.image
    operator: regex
    value: "(?i)(procdump|dumpert|moneta)"
  - field: process.command_line
    operator: regex
    value: "(?i)(lsass|accept|-ma)"

---
# Rule: Comsvcs.dll LSASS dump
rule_id: CRE-004
name: Comsvcs.dll MiniDump
description: >
  Detects the use of comsvcs.dll's MiniDump function to dump LSASS
  memory, a fileless technique that avoids dropping tools to disk.
family: credential_access
severity: critical
confidence: 0.94
phase: credential_access
attack_tactics:
  - Credential Access
  - Defense Evasion
  - Technique: T1003.001
match_any:
  - comsvcs
  - minidump
  - lsass
conditions:
  - field: process.image
    operator: contains
    value: rundll32
  - field: process.command_line
    operator: regex
    value: '(?i)(comsvcs\.dll.*minidump|lsass)'

---
# Rule: Registry credential access
rule_id: CRE-005
name: SAM/SECURITY Hive Access
description: >
  Detects access to the SAM and SECURITY registry hives, which contain
  cached credentials and can be extracted for offline cracking.
family: credential_access
severity: high
confidence: 0.88
phase: credential_access
attack_tactics:
  - Credential Access
  - Technique: T1003.002
match_any:
  - sam
  - security
  - system
  - registry
conditions:
  - field: registry.key_path
    operator: regex
    value: '(?i)(\\registry\\machine\\sam|\\registry\\machine\\system\\.*controlset.*services)?'

---
# Rule: NTDS.dit access
rule_id: CRE-006
name: NTDS.dit Access on Domain Controller
description: >
  Detects access to the NTDS.dit database file on domain controllers,
  which contains all Active Directory credential hashes.
family: credential_access
severity: critical
confidence: 0.96
phase: credential_access
attack_tactics:
  - Credential Access
  - Technique: T1003.003
match_any:
  - ntds
  - domain
  - controller
conditions:
  - field: file.path
    operator: regex
    value: '(?i)(ntds\.dit|windows\\ntds)'

---
# Rule: DCSync attack
rule_id: CRE-007
name: DCSync Credential Dumping
description: >
  Detects DCSync attacks where attackers use directory replication
  APIs to extract password hashes from domain controllers.
family: credential_access
severity: critical
confidence: 0.91
phase: credential_access
attack_tactics:
  - Credential Access
  - Technique: T1003.006
match_any:
  - drsuapi
  - dcsync
  - replication
conditions:
  - field: raw_data.EventID
    operator: equals
    value: 4662
  - field: raw_data.ObjectType
    operator: contains
    value: domain-DNS

---
# Rule: Kerberoasting
rule_id: CRE-008
name: Kerberoasting Attack Detected
description: >
  Detects Kerberoasting attacks where service account tickets are
  requested for offline cracking.
family: credential_access
severity: high
confidence: 0.85
phase: credential_access
attack_tactics:
  - Credential Access
  - Technique: T1558.003
match_any:
  - kerberoast
  - spn
  - ticket
conditions:
  - field: raw_data.EventID
    operator: equals
    value: 4769
  - field: raw_data.ServiceName
    operator: not_contains
    value: "krbtgt"

---
# Rule: AS-REP Roasting
rule_id: CRE-009
name: AS-REP Roasting Attack
description: >
  Detects AS-REP roasting attacks targeting users with
  "Do not require Kerberos preauthentication" set.
family: credential_access
severity: high
confidence: 0.83
phase: credential_access
attack_tactics:
  - Credential Access
  - Technique: T1558.004
match_any:
  - asrep
  - kerberos
  - preauth
conditions:
  - field: raw_data.EventID
    operator: equals
    value: 4768
  - field: raw_data.PreAuthType
    operator: equals
    value: "17"

---
# Rule: Credential enumeration
rule_id: CRE-010
name: Credential Enumeration Activity
description: >
  Detects commands and tools used to enumerate stored credentials,
  including Windows Vault and Credential Manager access.
family: credential_access
severity: medium
confidence: 0.75
phase: credential_access
attack_tactics:
  - Credential Access
  - Discovery
  - Technique: T1555
match_any:
  - vault
  - credential
  - cmdkey
conditions:
  - field: process.command_line
    operator: regex
    value: "(?i)(cmdkey.*list|vaultcmd|dpapi)"